services:
  - type: web
    name: market-replay
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install --prefer-binary -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true